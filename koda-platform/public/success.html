<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODA - ¡Registro Exitoso!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --primary-accent: #58a6ff;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --success-color: #2ea043;
            --border-color: #30363d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .success-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 4rem;
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-accent);
            color: #000;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #3182ce;
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="icon">✅</div>
        <h1>¡Suscripción Activada!</h1>
        <p>Tu período de prueba de 3 días con KODA ha comenzado exitosamente. Ya enviamos un mensaje a tu cuenta de
            Telegram con todos los detalles.</p>
        <p>A partir de este momento ya tienes acceso total a tu nuevo plan. Vuelve al chat para empezar a explorar.</p>
        <a href="https://t.me/TuBotDeKODA" target="_blank" class="btn">Abrir Telegram</a>
    </div>
</body>

</html>
